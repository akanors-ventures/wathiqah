name: Atlas
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci-atlas.yaml
      - 'apps/api/prisma/schema.prisma'
      - 'apps/api/atlas/migrations/*'
      - 'apps/api/atlas.hcl'
  pull_request:
    paths:
      - 'apps/api/prisma/schema.prisma'
      - 'apps/api/atlas/migrations/*'
# Permissions to write comments on the pull request.
permissions:
  contents: read
  pull-requests: write
defaults:
  run:
    working-directory: apps/api

jobs:
  atlas:
    services:
      # Spin up a postgres:15 container to be used as the dev-database for analysis.
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dev
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-start-period 10s
          --health-timeout 5s
          --health-retries 5
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ariga/setup-atlas@v0
        with:
          cloud-token: ${{ secrets.ATLAS_CLOUD_TOKEN_KRORA4 }}
      - uses: ariga/atlas-action/migrate/lint@v1
        with:
          dir: 'file://apps/api/atlas/migrations'
          dir-name: 'app'
          dev-url: 'postgres://postgres:pass@localhost:5432/dev?search_path=public&sslmode=disable'
      - uses: ariga/atlas-action/migrate/push@v1
        if: github.ref == 'refs/heads/main'
        with:
          dir: 'file://apps/api/atlas/migrations'
          dir-name: 'app'
          dev-url: 'postgres://postgres:pass@localhost:5432/dev?search_path=public&sslmode=disable'
      - name: Apply migrations
        if: github.ref == 'refs/heads/main'
        run: |
          atlas migrate apply \
            --dir "file://atlas/migrations" \
            --url "${{ secrets.DB_URL }}" \
            --baseline "20260224181022"
