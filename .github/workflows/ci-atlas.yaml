name: Atlas
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci-atlas.yaml
      - "apps/api/prisma/schema.prisma"
      - "apps/api/atlas/migrations/*"
      - "apps/api/atlas.hcl"
  pull_request:
    paths:
      - "apps/api/prisma/schema.prisma"
      - "apps/api/atlas/migrations/*"
defaults:
  run:
    working-directory: apps/api

jobs:
  atlas:
    services:
      # Spin up a postgres:15 container to be used as the dev-database for analysis.
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dev
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-start-period 10s
          --health-timeout 5s
          --health-retries 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ariga/setup-atlas@v0
      # - name: Lint migrations
      #   run: |
      #     atlas migrate lint \
      #       --dir "file://atlas/migrations" \
      #       --dev-url "postgres://postgres:pass@localhost:5432/dev?search_path=public&sslmode=disable" \
      #       --latest 1
      - name: Apply migrations
        if: github.ref == 'refs/heads/main'
        run: |
          atlas migrate apply \
            --dir "file://atlas/migrations" \
            --url "${{ secrets.DB_URL }}" \
            --baseline "20260224181022"
